<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#F97316"/>
  <!-- Subtle inner glow -->
  <rect width="512" height="512" rx="112" fill="url(#grad)" opacity="0.3"/>
  <defs>
    <radialGradient id="grad" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.1"/>
    </radialGradient>
  </defs>

  <!-- Dumbbell icon -->
  <!-- Left weight plate outer -->
  <rect x="58" y="196" width="44" height="120" rx="10" fill="rgba(255,255,255,0.25)"/>
  <!-- Left weight plate inner -->
  <rect x="74" y="216" width="28" height="80" rx="7" fill="rgba(255,255,255,0.9)"/>
  <!-- Right weight plate outer -->
  <rect x="410" y="196" width="44" height="120" rx="10" fill="rgba(255,255,255,0.25)"/>
  <!-- Right weight plate inner -->
  <rect x="410" y="216" width="28" height="80" rx="7" fill="rgba(255,255,255,0.9)"/>
  <!-- Bar -->
  <rect x="102" y="240" width="308" height="32" rx="8" fill="rgba(255,255,255,0.95)"/>
  <!-- Bar grip texture -->
  <rect x="180" y="244" width="8" height="24" rx="3" fill="rgba(249,115,22,0.5)"/>
  <rect x="200" y="244" width="8" height="24" rx="3" fill="rgba(249,115,22,0.5)"/>
  <rect x="220" y="244" width="8" height="24" rx="3" fill="rgba(249,115,22,0.5)"/>
  <rect x="296" y="244" width="8" height="24" rx="3" fill="rgba(249,115,22,0.5)"/>
  <rect x="316" y="244" width="8" height="24" rx="3" fill="rgba(249,115,22,0.5)"/>
  <rect x="336" y="244" width="8" height="24" rx="3" fill="rgba(249,115,22,0.5)"/>

  <!-- "TF" lettermark below bar -->
  <text x="256" y="400" font-family="system-ui, -apple-system, sans-serif"
        font-weight="900" font-size="72" fill="rgba(255,255,255,0.95)"
        text-anchor="middle" letter-spacing="4">TF</text>
  <!-- Small year -->
  <text x="256" y="440" font-family="system-ui, -apple-system, sans-serif"
        font-weight="600" font-size="24" fill="rgba(255,255,255,0.6)"
        text-anchor="middle" letter-spacing="2">2025</text>
</svg>
